<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Examen: Computación Ubicua</title>
<style>
  :root {
    --bg-color: #121212;
    --card-bg: #1e1e1e;
    --text-primary: #ffffff;
    --accent: #bb86fc;
    --btn-bg: #333333;
    --btn-hover: #444444;
    --correct: #4caf50;
    --wrong: #f44336;
  }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-primary);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }
  .quiz-container {
    background-color: var(--card-bg);
    padding: 2rem;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.8);
    width: 90%;
    max-width: 650px;
  }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--accent); text-align: center; }
  .progress { text-align: center; font-size: 0.9rem; color: #888; margin-bottom: 1.5rem; }
  .question { font-size: 1.2rem; margin-bottom: 1.5rem; line-height: 1.4; }
  .options { display: flex; flex-direction: column; gap: 12px; }
  button {
    background-color: var(--btn-bg);
    color: var(--text-primary);
    border: 1px solid #555;
    padding: 12px 15px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    text-align: left;
    font-size: 1rem;
  }
  button:hover { background-color: var(--btn-hover); transform: translateX(5px); }
  button.correct { background-color: var(--correct) !important; border-color: var(--correct); pointer-events: none; }
  button.wrong { background-color: var(--wrong) !important; border-color: var(--wrong); pointer-events: none; }
  .hidden { display: none; }
  .controls { margin-top: 1.5rem; display: flex; justify-content: flex-end; }
  #next-btn {
    background-color: #03dac6;
    color: #000;
    font-weight: bold;
    padding: 10px 25px;
    border: none;
    border-radius: 6px;
    text-align: center;
  }
  #next-btn:hover { background-color: #018786; transform: none; }
  .result-container { text-align: center; }
  .result-container h2 { font-size: 2rem; margin-bottom: 1rem; }
  .score { font-size: 3rem; font-weight: bold; color: #03dac6; margin-bottom: 1rem; }
</style>
</head>
<body>

<div class="quiz-container">
  <div id="quiz">
    <h1>Repaso: Computación Ubicua</h1>
    <div id="progress" class="progress"></div>
    <div id="question" class="question"></div>
    <div id="options" class="options"></div>
    <div class="controls">
      <button id="next-btn" class="hidden">Siguiente Pregunta</button>
    </div>
  </div>

  <div id="result" class="result-container hidden">
    <h2>¡Examen Finalizado!</h2>
    <p>Tu puntuación final es:</p>
    <div id="score" class="score"></div>
    <button onclick="location.reload()" style="background-color: var(--accent); color: #000; font-weight:bold; text-align:center;">Volver a Intentar</button>
  </div>
</div>

<script>
  const quizData = [
    // Redes de Sensores
    { q: "1. ¿Qué es una red de sensores?", o: ["Un conjunto de computadoras conectadas a internet", "Un sistema de dispositivos que recolectan y transmiten datos del entorno", "Una red social para compartir información", "Un tipo de base de datos distribuida"], a: 1 },
    { q: "2. ¿Cuál es la función principal de un 'nodo' en una red de sensores?", o: ["Solo almacenar datos a largo plazo", "Percibir datos de entorno, procesarlos y transmitirlos", "Proveer energía eléctrica a la red", "Servir como interfaz de usuario"], a: 1 },
    { q: "3. ¿Cuál es el componente principal de un nodo sensor?", o: ["Monitor", "Microcontrolador", "Impresora", "Disco duro externo"], a: 1 },
    { q: "4. ¿Cuál es la función de una 'Pasarela' (Gateway) en una red de sensores?", o: ["Cifrar los datos para que nadie los vea.", "Conectar la red de sensores con redes externas como Internet", "Actuar como un sensor de movimiento infrarrojo.", "Recargar las baterías de los nodos de forma inalámbrica."], a: 1 },
    { q: "5. ¿Cuál es la función de una estación base (sink)?", o: ["Diseñar sensores nuevos.", "Recibir y procesar datos enviados por los nodos.", "Reparar nodos dañados.", "Cambiar la frecuencia de la red."], a: 1 },
    { q: "6. ¿Qué protocolo se usa comúnmente para comunicación de bajo consumo en WSN?", o: ["HTTP", "FTP", "Zigbee", "SMTP"], a: 2 },
    { q: "7. En el contexto de WSN, ¿qué significa el término 'Escalabilidad'?", o: ["La capacidad de la red para funcionar con un gran número de nodos.", "La altura máxima a la que se puede instalar un sensor.", "La velocidad de procesamiento de un solo nodo.", "El costo total de los materiales de la red."], a: 0 },
    { q: "8. ¿Qué es una topología en una red de sensores?", o: ["El diseño o forma en que se conectan los nodos.", "El voltaje de los sensores.", "El tipo de batería utilizada.", "El lenguaje de programación del sistema."], a: 0 },
    { q: "9. ¿Cuál es un desafío común en las redes de sensores?", o: ["Exceso de memoria RAM.", "Problemas de seguridad y fallas en nodos.", "Demasiados puertos USB.", "Tamaño del monitor."], a: 1 },
    { q: "10. ¿Qué relación tienen las redes de sensores con el Internet de las Cosas (IoT)?", o: ["No tienen relación.", "Las redes de sensores permiten recopilar datos para sistemas IoT.", "IoT solo funciona con computadoras de escritorio.", "Las redes de sensores reemplazan internet."], a: 1 },
    // Seguridad Informática
    { q: "11. ¿Qué es una contraseña segura?", o: ["123456", "Tu nombre", "Una combinación de letras, números y símbolos", "Tu fecha de nacimiento"], a: 2 },
    { q: "12. ¿Qué es un virus informático?", o: ["Un programa que protege la computadora", "Un programa que puede dañar un equipo", "Un navegador web", "Un tipo de hardware"], a: 1 },
    { q: "13. ¿Qué debes hacer si recibes un correo sospechoso de un desconocido?", o: ["Abrirlo inmediatamente", "Descargar los archivos adjuntos", "Ignorarlo o eliminarlo", "Compartirlo con amigos"], a: 2 },
    { q: "14. ¿Qué es el phishing?", o: ["Un videojuego", "Un ataque para robar información fingiendo ser alguien confiable", "Un antivirus", "Un programa para editar fotos"], a: 1 },
    { q: "15. ¿Para qué sirve un antivirus?", o: ["Para acelerar internet", "Para crear contraseñas", "Para detectar y eliminar amenazas", "Para guardar archivos"], a: 2 },
    { q: "16. ¿Qué es importante hacer con tus contraseñas?", o: ["Compartirlas con amigos", "Usar la misma en todas partes", "Cambiarlas periódicamente", "Escribirlas en redes sociales"], a: 2 },
    { q: "17. ¿Cuál de estas redes es más segura para hacer pagos en línea?", o: ["Wi-Fi pública de un café", "Red desconocida", "Tu red privada de casa", "Wi-Fi abierta del parque"], a: 2 },
    { q: "18. ¿Qué significa hacer una copia de seguridad (backup)?", o: ["Borrar archivos viejos", "Guardar una copia de tus datos importantes", "Comprar otra computadora", "Apagar el equipo"], a: 1 },
    { q: "19. ¿Qué debes hacer antes de instalar un programa?", o: ["Descargar cualquiera", "Verificar que sea de una fuente confiable", "Desactivar el antivirus", "Compartirlo primero"], a: 1 },
    { q: "20. ¿Qué ayuda a proteger una cuenta además de la contraseña?", o: ["Cambiar el fondo de pantalla", "Tener muchas pestañas abiertas", "La verificación en dos pasos", "Usar letras mayúsculas en tu nombre"], a: 2 },
    // Redes ad hoc
    { q: "21. ¿Qué es una red ad hoc?", o: ["Una red con servidores centrales", "Una red sin infraestructura fija", "Una red solo por cable", "Una red de internet global"], a: 1 },
    { q: "22. ¿Cuál es una característica principal de las redes ad hoc?", o: ["Requieren router", "Son centralizadas", "Son auto-configurables", "Solo funcionan con cable"], a: 2 },
    { q: "23. En una red ad hoc, los dispositivos se comunican:", o: ["Solo a través de un servidor", "Directamente entre sí", "Solo por internet", "Mediante satélite"], a: 1 },
    { q: "24. ¿Qué tipo de dispositivos pueden formar una red ad hoc?", o: ["Solo computadoras", "Solo celulares", "Cualquier dispositivo con conexión inalámbrica", "Solo servidores"], a: 2 },
    { q: "25. ¿Qué ventaja tienen las redes ad hoc?", o: ["Bajo costo de instalación", "Necesitan mucho cable", "Son difíciles de crear", "Requieren infraestructura compleja"], a: 0 },
    { q: "26. ¿Dónde se usan comúnmente las redes ad hoc?", o: ["En oficinas con servidores", "En situaciones de emergencia", "En bancos", "En redes cableadas"], a: 1 },
    { q: "27. ¿Qué significa que una red sea descentralizada?", o: ["Tiene un solo nodo principal", "No tiene control central", "Depende de internet", "Solo usa cables"], a: 1 },
    { q: "28. ¿Qué problema pueden tener las redes ad hoc?", o: ["Mucha estabilidad siempre", "Alto costo", "Seguridad limitada", "Uso exclusivo de cables"], a: 2 },
    { q: "29. ¿Qué tecnología se usa comúnmente en redes ad hoc?", o: ["Bluetooth o Wi-Fi", "Fibra óptica", "Cable coaxial", "DSL"], a: 0 },
    { q: "30. En una red ad hoc, cada dispositivo puede actuar como:", o: ["Solo cliente", "Solo servidor", "Cliente y router", "Solo repetidor"], a: 2 },
    // Interconexión de Dispositivos Heterogéneos
    { q: "31. ¿Qué significa la 'interconexión de dispositivos heterogéneos' en IoT?", o: ["Conexión de dispositivos con las mismas características de hardware y software.", "La capacidad de comunicar dispositivos de diferentes fabricantes, arquitecturas y sistemas operativos.", "El uso exclusivo de cables de fibra óptica para computadoras de una misma marca.", "La desconexión programada de equipos que no comparten el mismo protocolo."], a: 1 },
    { q: "32. ¿Qué elemento de software facilita la comunicación y el intercambio de datos entre sistemas operativos distintos?", o: ["El firmware del enrutador.", "Un controlador de video (Driver).", "El Middleware.", "Un procesador de texto."], a: 2 },
    { q: "33. En entornos de IoT con recursos limitados, ¿qué protocolo de mensajería ligero es un estándar clave?", o: ["FTP", "SMTP", "MQTT", "BGP"], a: 2 },
    { q: "34. ¿Qué equipo actúa como traductor entre protocolos específicos locales (Bluetooth/Zigbee) y servidores en Internet (TCP/IP)?", o: ["Un Gateway (Puerta de enlace).", "Un repetidor (Repeater).", "Un Hub (Concentrador).", "Un conmutador (Switch) no administrable."], a: 0 },
    { q: "35. ¿A qué nivel de interoperabilidad nos referimos cuando diferentes dispositivos comprenden exactamente el mismo significado de los datos?", o: ["Interoperabilidad física.", "Interoperabilidad sintáctica.", "Interoperabilidad eléctrica.", "Interoperabilidad semántica."], a: 3 },
    { q: "36. ¿Por qué el modelo TCP/IP es crucial para la interconexión global de equipos heterogéneos?", o: ["Obligan a usar exactamente los mismos microchips.", "Proporcionan una arquitectura de capas estandarizada donde las reglas son independientes del hardware.", "Prohíben el uso de conexiones inalámbricas no seguras.", "Reescriben el código fuente para hacerlos compatibles."], a: 1 },
    { q: "37. ¿Cuál es el rol principal de las APIs RESTful en la integración de plataformas heterogéneas?", o: ["Aumentar el ancho de banda entre servidores.", "Compilar el código nativo de Windows en Linux.", "Encriptar discos duros a nivel hardware.", "Proveer reglas estándar y puntos de acceso web para interactuar usando HTTP."], a: 3 },
    { q: "38. Para el intercambio de datos estructurados, ¿qué formato es el estándar actual más utilizado por ser ligero e independiente del lenguaje?", o: ["Archivos ejecutables (.exe)", "JSON", "Código ensamblador", "SQL crudo"], a: 1 },
    { q: "39. En redes con enormes volúmenes de datos brutos, ¿qué ventaja aporta el 'Edge Computing'?", o: ["Envía el 100% de los datos crudos a la nube sin procesar.", "Procesa, filtra y normaliza los datos localmente antes de enviar a la nube solo lo relevante.", "Rechaza cualquier conexión de dispositivos de otros fabricantes.", "Reemplaza direcciones IP por coordenadas GPS."], a: 1 },
    { q: "40. ¿Cuál representa uno de los mayores desafíos de seguridad al interconectar dispositivos heterogéneos?", o: ["Cortafuegos bloqueando marcas populares por error.", "Imposibilidad física de asignar IP estáticas a sistemas antiguos.", "Que los dispositivos menos potentes no tienen capacidad de procesamiento para usar criptografía moderna.", "Protocolos que exigen que los equipos no tengan contraseñas."], a: 2 },
    // Internet2 y CUDI
    { q: "41. ¿Qué es Internet2?", o: ["Una red social educativa", "Un consorcio de redes avanzadas para investigación y educación", "Un proveedor comercial de internet", "Un sistema operativo académico"], a: 1 },
    { q: "42. ¿Cuál es el principal objetivo de Internet2?", o: ["Desarrollar tecnologías avanzadas de red para investigación y educación", "Vender servicios de internet", "Crear videojuegos educativos", "Administrar redes domésticas"], a: 0 },
    { q: "43. ¿Qué significa CUDI?", o: ["Consejo Universal de Datos de Internet", "Centro Unificado de Desarrollo Informático", "Corporación Universitaria para el Desarrollo de Internet", "Comité Universitario Digital Internacional"], a: 2 },
    { q: "44. ¿Cuál es la función principal de CUDI en México?", o: ["Proveer internet comercial", "Crear redes sociales", "Desarrollar hardware", "Conectar universidades y centros de investigación con redes avanzadas"], a: 3 },
    { q: "45. ¿Qué tipo de instituciones participan en Internet2 y CUDI?", o: ["Universidades y centros de investigación", "Solo empresas privadas", "Solo gobiernos", "Usuarios domésticos"], a: 0 },
    { q: "46. ¿Qué ventaja ofrece Internet2 frente al internet tradicional?", o: ["Menor velocidad", "Solo acceso local", "Mayor seguridad, velocidad y capacidad para investigación", "Es gratuito para todos"], a: 2 },
    { q: "47. ¿Qué relación existe entre CUDI e Internet2?", o: ["No tienen relación", "Son la misma organización", "Compiten entre sí", "CUDI está conectada a Internet2 para colaboración internacional"], a: 3 },
    { q: "48. ¿Qué tipo de aplicaciones se benefician de Internet2?", o: ["Juegos offline", "Solo redes sociales", "Edición de texto básica", "Videollamadas de alta calidad, investigación científica y educación a distancia"], a: 3 },
    { q: "49. ¿Qué permite CUDI a las universidades mexicanas?", o: ["Evitar el uso de internet", "Limitar el acceso a estudiantes", "Acceder únicamente a páginas web", "Colaborar en proyectos internacionales de investigación"], a: 3 },
    { q: "50. ¿Por qué es importante Internet2 en la educación?", o: ["Porque solo sirve para entretenimiento", "Porque elimina el uso de computadoras", "Porque mejora la conectividad y permite nuevas formas de aprendizaje e investigación", "Porque reemplaza a los profesores"], a: 2 }
  ];

  let currentQuestionIndex = 0;
  let score = 0;
  let answered = false;

  const questionEl = document.getElementById('question');
  const optionsEl = document.getElementById('options');
  const nextBtn = document.getElementById('next-btn');
  const progressEl = document.getElementById('progress');
  const quizDiv = document.getElementById('quiz');
  const resultDiv = document.getElementById('result');
  const scoreEl = document.getElementById('score');

  function loadQuestion() {
    answered = false;
    nextBtn.classList.add('hidden');
    const currentQuizData = quizData[currentQuestionIndex];
    progressEl.innerText = `Pregunta ${currentQuestionIndex + 1} de ${quizData.length}`;
    questionEl.innerText = currentQuizData.q;
    optionsEl.innerHTML = '';
    
    currentQuizData.o.forEach((option, index) => {
      const button = document.createElement('button');
      button.innerText = option;
      button.addEventListener('click', () => selectAnswer(index, currentQuizData.a, button));
      optionsEl.appendChild(button);
    });
  }

  function selectAnswer(selectedIndex, correctIndex, button) {
    if (answered) return;
    answered = true;
    const buttons = optionsEl.querySelectorAll('button');
    
    if (selectedIndex === correctIndex) {
      button.classList.add('correct');
      score++;
    } else {
      button.classList.add('wrong');
      buttons[correctIndex].classList.add('correct');
    }
    
    nextBtn.classList.remove('hidden');
  }

  nextBtn.addEventListener('click', () => {
    currentQuestionIndex++;
    if (currentQuestionIndex < quizData.length) {
      loadQuestion();
    } else {
      quizDiv.classList.add('hidden');
      resultDiv.classList.remove('hidden');
      scoreEl.innerText = `${score} / ${quizData.length}`;
    }
  });

  // Iniciar simulador
  loadQuestion();
</script>
</body>
</html>
